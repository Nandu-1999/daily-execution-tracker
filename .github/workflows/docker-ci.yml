name: Docker CI

on:
  push:
    branches:
      - main

jobs:

  docker-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build \
            -t det-backend-ci \
            ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build \
            -t det-frontend-ci \
            ./frontend