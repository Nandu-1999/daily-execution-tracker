services:

  frontend:
    build:
      context: ./frontend

    container_name: det-frontend

    ports:
      - "4200:80"

    depends_on:
      - backend

  backend:
    build:
      context: ./backend

    container_name: det-backend

    ports:
      - "8000:8000"

    depends_on:
      - db

    environment:
      DATABASE_URL: ${DATABASE_URL}

  db:
    image: postgres:17

    container_name: det-postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: