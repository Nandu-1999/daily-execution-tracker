<app-navbar></app-navbar>
<div class="container mt-4" style="max-width: 900px;">
  <h1 class="mb-4">
  Dashboard
</h1>

<div class="card mb-4">

  <div class="card-body">

    <h5 class="card-title">
      Select Date
    </h5>

    <input
      type="date"
      class="form-control mb-3"
      [(ngModel)]="selectedDate"
    />

    <button
      class="btn btn-primary"
      (click)="loadSummary()"
    >
      Show Summary
    </button>

  </div>

</div>


<div class="card mb-4">

  <div class="card-body">

    <h5 class="card-title">
      Daily Summary
    </h5>

    <p>
      Total Minutes:
      {{ summary?.total_minutes || 0 }}
    </p>

    <p>
      Upskilling Minutes:
      {{ summary?.upskilling_minutes || 0 }}
    </p>

    <p>
      Work Minutes:
      {{ summary?.work_minutes || 0 }}
    </p>

  </div>

</div>
</div>
