apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres

        image: postgres:17

        ports:
        - containerPort: 5432

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"

        env:
        - name: POSTGRES_DB
          value: daily_tracker

        - name: POSTGRES_USER
          value: postgres

        - name: POSTGRES_PASSWORD
          value: 199nandu

        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-storage

      volumes:
      - name: postgres-storage

        persistentVolumeClaim:
          claimName: postgres-pvc